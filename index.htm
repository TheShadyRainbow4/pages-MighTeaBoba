        let activeFilter = "All";
        const allCats = ["All", ...new Set(masterDatabase.map(d => d.cat))];

        function renderFilters() {
            document.getElementById('filterContainer').innerHTML = allCats.map(cat => `
                <button class="category-pill ${activeFilter === cat ? 'active' : ''}" 
                        onclick="setFilter('${cat}')">${cat}</button>
            `).join('');
        }

        function setFilter(cat) {
            activeFilter = cat;
            renderFilters();
            renderList();
        }

        function toggleMain(index) {
            const drawer = document.getElementById(`drawer-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            if (drawer.classList.contains('active')) {
                drawer.classList.remove('active');
                icon.style.transform = 'rotate(0deg)';
            } else {
                drawer.classList.add('active');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleSize(dbIndex, sizeKey) {
            const content = document.getElementById(`size-${dbIndex}-${sizeKey}`);
            const btn = document.getElementById(`btn-${dbIndex}-${sizeKey}`);
            
            content.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function renderList() {
            const container = document.getElementById('databaseList');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = masterDatabase.filter(d => {
                const isCat = activeFilter === "All" || d.cat === activeFilter;
                const isMatch = d.name.toLowerCase().includes(searchQ) || 
                                (d.note && d.note.toLowerCase().includes(searchQ));
                return isCat && isMatch;
            });

            container.innerHTML = filtered.map((d, i) => {
                const sKeys = Object.keys(d.sizes);
                
                let sizeButtonsHtml = sKeys.map(k => {
                    let btnClass = k === 'teany' ? 'btn-teany' : k === 'mightea' ? 'btn-mightea' : 'btn-standard';
                    return `<button id="btn-${i}-${k}" class="size-btn ${btnClass} flex-1" onclick="toggleSize(${i}, '${k}')">
                                VIEW ${d.sizes[k].label.toUpperCase()}
                            </button>`;
                }).join('');

                let sizeContentHtml = sKeys.map(k => {
                    const data = d.sizes[k];
                    const ingsHtml = data.ings.map(ing => `<span class="ing-tag">${ing}</span>`).join('');
                    return `
                        <div id="size-${i}-${k}" class="size-content mt-2 p-2 bg-white rounded border border-gray-100 shadow-sm">
                            <div class="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest border-b border-gray-50 pb-1">${data.label} Build</div>
                            <div class="mb-2 leading-tight">${ingsHtml}</div>
                            <div class="text-xs text-gray-500 italic flex items-start gap-1"><i class="fas fa-arrow-right text-[10px] mt-0.5 opacity-50"></i> ${data.prep}</div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="elevated-row">
                        <!-- Header Row -->
                        <div class="flex items-center justify-between px-3 py-2 cursor-pointer bg-white rounded hover:bg-slate-50 transition" onclick="toggleMain(${i})">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 border border-gray-200 uppercase tracking-wider">${d.cat}</span>
                                <h3 class="font-bold text-sm text-gray-800 leading-none">${d.name}</h3>
                            </div>
                            <i id="icon-${i}" class="fas fa-chevron-down text-gray-300 text-[10px] transition-transform duration-200"></i>
                        </div>

                        <!-- Expansion Drawer -->
                        <div id="drawer-${i}" class="recipe-drawer px-3 pb-3 pt-2">
                            ${d.note ? `<div class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-wide flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> ${d.note}</div>` : ''}
                            
                            <div class="flex gap-2">

                            </div>
                            
                            <div class="flex flex-col gap-2">
                                ${sizeContentHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.onload = () => {
