    <script type="module">

        // Global State & Config
        const LOCAL_DB_KEY = 'mightea_inventory_redundancy_v3';
        let inventory = [];
        let connectionState = 'connecting'; // connecting, cloud, local
        let user = null;
        let isResetting = false;

        // Firebase Initialization Context Check
        let firebaseConfig = {};
        let appId = 'default-app-id';
        let initialAuthToken = null;

        // Check if injected by environment, otherwise use defaults for standalone tests
        if (typeof __firebase_config !== 'undefined') {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch(e){}
        }
        if (typeof __app_id !== 'undefined') appId = __app_id;
        if (typeof __initial_auth_token !== 'undefined') initialAuthToken = __initial_auth_token;

        let db = null;

        // Initialize App Date for Print View
        document.getElementById('print-date').innerText = new Date().toLocaleDateString();

        // ----------------------------------------------------
        // CUSTOM DIALOG SYSTEM (Replaces alert() and confirm())
        // ----------------------------------------------------
        const dialogModal = document.getElementById('dialog-modal');
        const dialogContent = document.getElementById('dialog-content');
        const dialogTitle = document.getElementById('dialog-title');
        const dialogMessage = document.getElementById('dialog-message');
        const dialogIcon = document.getElementById('dialog-icon');
        const dialogConfirmBtn = document.getElementById('dialog-confirm');
        const dialogCancelBtn = document.getElementById('dialog-cancel');
        
        let confirmCallback = null;

        function showDialog({ title, message, type = 'info', isConfirm = false, confirmText = 'OK', cancelText = 'Cancel', onConfirm = null }) {
            dialogTitle.innerText = title;
            dialogMessage.innerText = message;
            dialogConfirmBtn.innerText = confirmText;
            
            // Icon styling
            if (type === 'danger') {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-red-100 text-red-600 mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-red-600 hover:bg-red-700 w-full";
            } else if (type === 'warning') {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-yellow-100 text-yellow-600 mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-yellow-500 hover:bg-yellow-600 w-full";
            } else {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-mightea-teal/10 text-mightea-teal mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-mightea-teal hover:bg-teal-600 w-full";
            }

            if (isConfirm) {
                dialogCancelBtn.innerText = cancelText;
                dialogCancelBtn.classList.remove('hidden');
                dialogCancelBtn.classList.add('w-full');
            } else {
                dialogCancelBtn.classList.add('hidden');
                dialogCancelBtn.classList.remove('w-full');
            }

            confirmCallback = onConfirm;
            
            dialogModal.classList.remove('hidden');
            // Trigger reflow for transition
            void dialogModal.offsetWidth;
            dialogModal.classList.remove('opacity-0');
            dialogContent.classList.remove('scale-95');
        }

        function closeDialog() {
            dialogModal.classList.add('opacity-0');
            dialogContent.classList.add('scale-95');
            setTimeout(() => {
                dialogModal.classList.add('hidden');
                confirmCallback = null;
            }, 200);
        }

        dialogCancelBtn.addEventListener('click', closeDialog);
        dialogConfirmBtn.addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeDialog();
        });

        const inventoryContainer = document.getElementById('inventory-container');

                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Syncing...</span>

            }
        }

        function groupInventory() {
            const grouped = {};
            inventory.forEach(item => {
                const cat = item.category || 'Uncategorized';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });
            // Sort categories and items inside
            const sortedGrouped = {};
            Object.keys(grouped).sort().forEach(key => {
                sortedGrouped[key] = grouped[key].sort((a, b) => a.name.localeCompare(b.name));
            });
            return sortedGrouped;
        }

        function renderEmptyState() {
            return `
                <div class="bg-white/60 p-6 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.05)] text-center print-hidden my-6 border border-white">
                    <svg class="mx-auto mb-3 opacity-20" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    <h2 class="text-lg font-bold mb-2">Inventory is Empty</h2>
                    <p class="text-sm opacity-70 mb-6">Let's populate the database with your notes and standard cafe supplies.</p>
                    <button id="btn-seed-data" class="bg-mightea-orange text-white px-6 py-3 rounded-xl font-bold text-sm shadow-lg shadow-orange-500/30 hover:shadow-xl hover:-translate-y-0.5 transition-all">
                        Load Full Database
                    </button>
                </div>
            `;
        }

        function renderApp() {
            updateStatusUI();
            
            if (inventory.length === 0) {
                inventoryContainer.innerHTML = renderEmptyState();
                const seedBtn = document.getElementById('btn-seed-data');
                if(seedBtn) seedBtn.addEventListener('click', seedInitialData);
                return;
            }

            const grouped = groupInventory();
            let html = '';

            // Build Datalist for Add Modal
            const datalist = document.getElementById('category-list');
            datalist.innerHTML = Object.keys(grouped).map(cat => `<option value="${cat}">`).join('');

            for (const [category, items] of Object.entries(grouped)) {
                html += `
                <section class="print-break-inside-avoid">
                    <h2 class="text-sm font-bold uppercase tracking-wider mb-3 opacity-60 print:text-xs">
                        ${category}
                    </h2>
                    <div class="flex flex-col gap-2 print:gap-1">
                        ${items.map(item => `
                            <div class="relative bg-white/90 p-2 sm:p-3 rounded-xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-white/60 backdrop-blur-sm transform transition-all hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] flex items-center justify-between print:p-1 print:shadow-none print-border-b print:rounded-none group">
                                <div class="flex-1 pr-2 min-w-0">
                                    <div class="font-semibold text-sm truncate print:text-xs">${item.name}</div>

                                </div>
                                <div class="flex items-center gap-2 print:gap-1">
                                    <button data-action="minus" data-id="${item.id}" class="w-8 h-8 flex items-center justify-center bg-gray-50 text-gray-600 rounded-full shadow-sm border border-gray-100 active:scale-95 transition-all print-hidden">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    </button>
                                    <div class="w-8 text-center text-base font-bold print:text-sm print:text-right">
                                        ${item.quantity}

        // ----------------------------------------------------
        // DATA ACTIONS
        // ----------------------------------------------------
        
        async function updateQuantity(id, delta) {
            const itemIndex = inventory.findIndex(i => i.id === id);
            if (itemIndex === -1) return;
            
            const currentQty = inventory[itemIndex].quantity;
            const newQty = Math.max(0, currentQty + delta);
            
            // Optimistic Local Update
            inventory[itemIndex].quantity = newQty;
            localStorage.setItem(LOCAL_DB_KEY, JSON.stringify(inventory));
            renderApp(); // Re-render fast

            if (connectionState === 'cloud' && db) {
                try {
                    const itemRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id);
                    await updateDoc(itemRef, { quantity: newQty });
                } catch (err) {
                    console.error("Cloud update failed:", err);
                }
            }
        }

        async function deleteItemReq(id) {
            if (connectionState === 'local') {
                showDialog({ title: "Offline", message: "Please connect to the internet to delete items permanently." });
                return;
            }

            showDialog({
                title: "Delete Item?",
                message: "Are you sure you want to permanently remove this item from the list?",
                type: "warning",
                isConfirm: true,
                confirmText: "Delete",
                onConfirm: async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));
                    } catch (err) {
                        console.error("Error deleting item:", err);
                    }
                }
            });
        }

        // Global Event Delegation for Inventory List Clicks
        inventoryContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            
            if (action === 'plus') updateQuantity(id, 1);
            if (action === 'minus') updateQuantity(id, -1);
            if (action === 'delete') deleteItemReq(id);
        });


        // Handle Reset All Logic (Double Confirm)
        document.getElementById('btn-reset-all').addEventListener('click', () => {
            if (inventory.length === 0) return;
            if (connectionState === 'local') {
                showDialog({ title: "Offline", message: "You must be connected to the Cloud to perform a master reset." });
                return;
            }

            showDialog({
                title: "Reset All to 0?",
                message: "Are you sure you want to reset ALL inventory quantities to 0?",
                type: "warning",
                isConfirm: true,
                confirmText: "Yes, Reset",
                onConfirm: () => {
                    // Second confirmation
                    setTimeout(() => {
                        showDialog({
                            title: "FINAL WARNING",
                            message: "This action cannot be undone. Are you absolutely positive you want to wipe all counts to 0?",
                            type: "danger",
                            isConfirm: true,
                            confirmText: "WIPE EVERYTHING",
                            onConfirm: async () => {
                                if(isResetting) return;
                                isResetting = true;
                                document.getElementById('btn-reset-all').disabled = true;
                                
                                try {
                                    const batch = writeBatch(db);
                                    inventory.forEach((item) => {
                                        const itemRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', item.id);
                                        batch.update(itemRef, { quantity: 0 });
                                    });
                                    await batch.commit();
                                } catch (err) {
                                    console.error("Error resetting:", err);
                                    showDialog({ title: "Error", message: "Failed to reset. Please try again." });
                                } finally {
                                    isResetting = false;
                                    document.getElementById('btn-reset-all').disabled = false;
                                }
                            }
                        });
                    }, 300); // slight delay to let first modal close cleanly
                }

            addModal.classList.remove('hidden');

        }

            addModal.classList.add('opacity-0');
            addModalContent.classList.add('scale-95');

        document.getElementById('add-item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (connectionState === 'local') {
                showDialog({ title: "Offline", message: "Please connect to the internet to add entirely new items." });
                closeAddModal();
                return;
            }

            const category = document.getElementById('add-category').value.trim();
            const name = document.getElementById('add-name').value.trim();
            const quantity = Number(document.getElementById('add-qty').value) || 0;
            const unit = document.getElementById('add-unit').value.trim();

            if (!name || !category) return;

            try {
                const batch = writeBatch(db);
                const newDocRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'));
                
                batch.set(newDocRef, { category, name, quantity, unit });
                await batch.commit();
                
                closeAddModal();
                e.target.reset();
                document.getElementById('add-qty').value = "0";
            } catch (err) {

                showDialog({ title: "Error", message: "Failed to add new item." });

        // ----------------------------------------------------
        // FIREBASE SETUP & INITIALIZATION
        // ----------------------------------------------------
        async function initializeAppLogic() {
            // 1. INSTANT LOCAL LOAD
            const localData = localStorage.getItem(LOCAL_DB_KEY);
            if (localData) {
                try {
                    inventory = JSON.parse(localData);
                    loader.classList.add('hidden');
                    renderApp();
                } catch(e) {}
            }

            // Guard against empty Firebase config (for standalone viewing without credentials)
            if (!Object.keys(firebaseConfig).length) {
                loader.classList.add('hidden');
                connectionState = 'local';
                if(inventory.length === 0) renderApp(); // Trigger empty state
                showDialog({ title: "No Cloud DB", message: "Firebase configuration is missing. Running in local-only demo mode." });
                return;
            }

            // 2. BOOT FIREBASE
            try {
                const fbApp = initializeApp(firebaseConfig);
                auth = getAuth(fbApp);
                db = getFirestore(fbApp);

                // Authentication
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                // Check Online Status Events
                window.addEventListener('offline', () => { connectionState = 'local'; updateStatusUI(); });
                window.addEventListener('online', () => { connectionState = 'connecting'; updateStatusUI(); });

                onAuthStateChanged(auth, (currentUser) => {
                    user = currentUser;
                    if (user) setupLiveSync();
                });

            } catch (err) {
                console.error("Firebase Init Error:", err);
                connectionState = 'local';
                loader.classList.add('hidden');
                renderApp();
            }
        }

        function setupLiveSync() {
            if (!navigator.onLine) {
                connectionState = 'local';
                updateStatusUI();
                return;
            }

            const inventoryRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            
            onSnapshot(inventoryRef, (snapshot) => {
                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                inventory = items;
                connectionState = 'cloud';
                loader.classList.add('hidden');
                
                // OVERWRITE LOCAL REDUNDANCY
                localStorage.setItem(LOCAL_DB_KEY, JSON.stringify(items));
                
                renderApp();
            }, (err) => {
                console.error("Snapshot error:", err);
                connectionState = 'local';
                updateStatusUI();
            });
        }
