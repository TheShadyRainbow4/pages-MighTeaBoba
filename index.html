        const dialogModal = document.getElementById('dialog-modal');
        const dialogContent = document.getElementById('dialog-content');
        const dialogTitle = document.getElementById('dialog-title');
        const dialogMessage = document.getElementById('dialog-message');
        const dialogIcon = document.getElementById('dialog-icon');
        const dialogConfirmBtn = document.getElementById('dialog-confirm');
        const dialogCancelBtn = document.getElementById('dialog-cancel');
        let confirmCallback = null;

        function showDialog({ title, message, type = 'info', isConfirm = false, confirmText = 'OK', cancelText = 'Cancel', onConfirm = null }) {
            dialogTitle.innerText = title;
            dialogMessage.innerText = message;
            dialogConfirmBtn.innerText = confirmText;
            
            if (type === 'danger') {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-red-100 text-red-600 mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-red-600 hover:bg-red-700 w-full";
            } else if (type === 'warning') {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-yellow-100 text-yellow-600 mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-yellow-500 hover:bg-yellow-600 w-full";
            } else {
                dialogIcon.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-mightea-teal/10 text-mightea-teal mb-4";
                dialogIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
                dialogConfirmBtn.className = "px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors bg-mightea-teal hover:bg-teal-600 w-full";
            }

            if (isConfirm) {
                dialogCancelBtn.innerText = cancelText;
                dialogCancelBtn.classList.remove('hidden');
                dialogCancelBtn.classList.add('w-full');
            } else {
                dialogCancelBtn.classList.add('hidden');
                dialogCancelBtn.classList.remove('w-full');
            }

            confirmCallback = onConfirm;
            dialogModal.classList.remove('hidden');
            void dialogModal.offsetWidth;
            dialogModal.classList.remove('opacity-0');
            dialogContent.classList.remove('scale-95');
        }

        function closeDialog() {
            dialogModal.classList.add('opacity-0');
            dialogContent.classList.add('scale-95');
            setTimeout(() => {
                dialogModal.classList.add('hidden');
                confirmCallback = null;
            }, 200);
        }

        dialogCancelBtn.addEventListener('click', closeDialog);
        dialogConfirmBtn.addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeDialog();

        // ----------------------------------------------------
        // REMOTE DATABASE SYNC LOGIC
        // ----------------------------------------------------
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const statusEl = document.getElementById('connection-status');
        const offlineBanner = document.getElementById('offline-banner');

        function setStatus(status) {
            if (status === 'cloud') {
                offlineBanner.classList.add('hidden');
                statusEl.innerHTML = `<svg class="text-emerald-500" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg><span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Cloud Sync On</span>`;
            } else if (status === 'syncing') {
                offlineBanner.classList.add('hidden');
                statusEl.innerHTML = `<svg class="text-mightea-teal animate-spin" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span class="text-[10px] font-bold text-mightea-teal uppercase tracking-wider">Saving...</span>`;
            } else {
                offlineBanner.classList.remove('hidden');
                statusEl.innerHTML = `<svg class="text-yellow-600" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span class="text-[10px] font-bold text-yellow-600 uppercase tracking-wider">Offline</span>`;
            }
        }

        async function syncToRemote() {
            if (!dbId || !navigator.onLine) return;
            setStatus('syncing');
            try {
                await fetch(`https://api.npoint.io/${dbId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(inventory)
                });
                setStatus('cloud');
            } catch (err) {
                console.error("Failed to save to cloud", err);
                setStatus('offline');
            }
        }

        async function fetchFromRemote() {
            if (!dbId || !navigator.onLine) return;
            try {
                const res = await fetch(`https://api.npoint.io/${dbId}`);
                const data = await res.json();
                if (data && Array.isArray(data)) {
                    inventory = data;
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                    renderApp();
                    setStatus('cloud');
                }
            } catch (err) {
                console.error("Failed to load from cloud", err);
            }
        }

        async function initializeDatabase() {
            // Instant load from local if available to prevent blank screens
            const local = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (local) {
                inventory = JSON.parse(local);
                loader.classList.add('hidden');
                renderApp();
            }

            if (!navigator.onLine) {
                setStatus('offline');
                return;
            }

            if (!dbId) {
                // CREATE A BRAND NEW REMOTE DATABASE
                loaderText.innerText = "Building Public Database...";
                loader.classList.remove('hidden');
                try {
                    const res = await fetch('https://api.npoint.io/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(initialData)
                    });
                    const data = await res.json();
                    dbId = data.id; // Save the newly generated ID
                    window.location.hash = dbId; // Put it in the URL!
                    inventory = initialData;
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                    
                    loader.classList.add('hidden');
                    renderApp();
                    setStatus('cloud');
                } catch (e) {
                    showDialog({ title: "Connection Error", message: "Failed to build the remote database. Running in local mode." });
                    loader.classList.add('hidden');
                    setStatus('offline');
                }
            } else {
                // LOAD EXISTING REMOTE DATABASE (Using ID from URL)
                loaderText.innerText = "Syncing Remote Data...";
                await fetchFromRemote();
                loader.classList.add('hidden');
            }

            // Poll the remote database every 7 seconds to catch changes from other devices
            setInterval(fetchFromRemote, 7000);
        }


        // ----------------------------------------------------
        // UI RENDERING & DATA MANIPULATION
        // ----------------------------------------------------
        const inventoryContainer = document.getElementById('inventory-container');

        function renderApp() {
            const grouped = {};
            inventory.forEach(item => {
                const cat = item.category || 'Uncategorized';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });
            
            const sortedGrouped = {};
            Object.keys(grouped).sort().forEach(key => {
                sortedGrouped[key] = grouped[key].sort((a, b) => a.name.localeCompare(b.name));
            });

            let html = '';
            const datalist = document.getElementById('category-list');
            datalist.innerHTML = Object.keys(sortedGrouped).map(cat => `<option value="${cat}">`).join('');

            for (const [category, items] of Object.entries(sortedGrouped)) {
                html += `
                <section class="print-break-inside-avoid">
                    <h2 class="text-sm font-bold uppercase tracking-wider mb-3 opacity-60 print:text-xs">${category}</h2>
                    <div class="flex flex-col gap-2 print:gap-1">
                        ${items.map(item => `

                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    </button>
                                    <div class="w-8 text-center text-base font-bold print:text-sm print:text-right">${item.quantity}</div>
                                    <button data-action="plus" data-id="${item.id}" class="w-8 h-8 flex items-center justify-center bg-mightea-teal text-white rounded-full shadow-md shadow-teal-500/20 active:scale-95 transition-all print-hidden">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    </button>
                                    <button data-action="delete" data-id="${item.id}" class="ml-1 w-6 h-6 flex items-center justify-center text-gray-300 hover:text-red-500 sm:opacity-0 group-hover:opacity-100 transition-all print-hidden">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }
            inventoryContainer.innerHTML = html;
        }

        // Action Handlers
        inventoryContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            
            if (action === 'plus' || action === 'minus') {
                const itemIndex = inventory.findIndex(i => i.id === id);
                if (itemIndex === -1) return;
                const delta = action === 'plus' ? 1 : -1;
                inventory[itemIndex].quantity = Math.max(0, inventory[itemIndex].quantity + delta);
                
                // Optimistic Local Update
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                renderApp(); 
                
                // Push to cloud in background
                syncToRemote();
            }
            
            if (action === 'delete') {
                showDialog({
                    title: "Delete Item?", message: "Permanently remove this item?", type: "warning", isConfirm: true, confirmText: "Delete",
                    onConfirm: () => {
                        inventory = inventory.filter(i => i.id !== id);
                        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                        renderApp();
                        syncToRemote();
                    }
                });
            }
        });

        document.getElementById('btn-reset-all').addEventListener('click', () => {
            if (inventory.length === 0) return;
            showDialog({
                title: "Reset All to 0?", message: "Are you sure you want to reset ALL quantities to 0?", type: "warning", isConfirm: true, confirmText: "Yes, Reset",
                onConfirm: () => {
                    setTimeout(() => {
                        showDialog({
                            title: "FINAL WARNING", message: "This action cannot be undone. Are you positive you want to wipe all counts to 0?", type: "danger", isConfirm: true, confirmText: "WIPE EVERYTHING",
                            onConfirm: () => {
                                inventory = inventory.map(item => ({...item, quantity: 0}));
                                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                                renderApp();
                                syncToRemote();
                            }
                        });
                    }, 300);
                }
            });
        });

        // Add Modal Handlers
        const addModal = document.getElementById('add-modal');
        const addModalContent = document.getElementById('add-modal-content');
        
        document.getElementById('btn-fab-add').addEventListener('click', () => {
            addModal.classList.remove('hidden');
            void addModal.offsetWidth; 
            addModal.classList.remove('opacity-0');
            addModalContent.classList.remove('scale-95');
        });
        
        function closeAddModal() {
            addModal.classList.add('opacity-0');
            addModalContent.classList.add('scale-95');
            setTimeout(() => addModal.classList.add('hidden'), 200);
        }
        document.getElementById('close-add-modal').addEventListener('click', closeAddModal);

        document.getElementById('add-item-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const category = document.getElementById('add-category').value.trim();
            const name = document.getElementById('add-name').value.trim();
            const quantity = Number(document.getElementById('add-qty').value) || 0;
            const unit = document.getElementById('add-unit').value.trim();
            
            if (!name || !category) return;

            inventory.push({ id: generateId(), category, name, quantity, unit });
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
            renderApp();
            syncToRemote();
            
            closeAddModal();
            e.target.reset();
            document.getElementById('add-qty').value = "0";
        });

        // Boot
        window.addEventListener('online', () => initializeDatabase());
        window.addEventListener('offline', () => setStatus('offline'));
        initializeDatabase();

    </script>
</body>
